<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Fraud Check Result - Claim {{ claim.claim_id }}</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #3e7a91;
            color: white;
            padding: 20px;
            text-align: center;
        }
        main {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .status {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
        .accepted { color: green; }
        .rejected { color: red; }
        .pending { color: orange; }
        .notes {
            background: #e9f5ff;
            border-left: 4px solid #3e7a91;
            padding: 15px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-size: 16px;
        }
        a.button {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #3e7a91;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
        }
        a.button:hover {
            background-color: #2c5269;
        }
    </style>
</head>
<body>
    <header>
        <h1>Fraud Check Result for Claim {{ claim.claim_id }}</h1>
    </header>

    <main>
        <div class="status {% if claim.status == 'Accepted' %}accepted{% elif claim.status == 'Rejected' %}rejected{% else %}pending{% endif %}">
            Status: {{ claim.status }}
        </div>

        {% if claim.notes %}
        <div class="notes">
            <strong>Fraud Detection Notes:</strong><br />
            {{ claim.notes }}
        </div>
        {% else %}
        <p>No additional fraud notes available for this claim.</p>
        {% endif %}

        <a href="{% url 'admin_claim_list' %}" class="button">Back to Claims List</a>
    </main>
</body>
</html>
