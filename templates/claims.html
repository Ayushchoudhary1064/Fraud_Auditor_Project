<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Submit Claim - Fraud Auditor</title>
   <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css">
   <style>
      @import url('https://fonts.googleapis.com/css?family=Noto+Sans+TC&display=swap');

      body {
         margin: 0;
         padding: 0;
         background-color: #f4f4f4;
         font-family: 'Noto Sans TC', sans-serif;
         display: flex;
         flex-direction: column;
         min-height: 100vh;
      }

      #header {
         background-color: #3e7a91;
         color: white;
         padding: 20px;
         text-align: center;
         font-size: 28px;
         font-weight: bold;
         border-bottom: 2px solid #2c3e50;
      }

      main {
         flex: 1;
         display: flex;
         justify-content: center;
         align-items: center;
         padding: 40px 20px;
      }

      .form-box {
         width: 600px;
         background: white;
         padding: 40px 30px;
         border-radius: 5px;
         box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
         position: relative;
      }

      .form-box h2 {
         margin-bottom: 30px;
         color: #3e7a91;
         text-align: center;
      }

      form label {
         display: block;
         margin-top: 15px;
         font-weight: bold;
      }

      form input, form select {
         height: 40px;
         width: 100%;
         padding: 0 10px;
         margin-top: 5px;
         border-radius: 3px;
         border: 1px solid silver;
         font-size: 16px;
         outline: none;
      }

      form input[type="submit"] {
         background: #3e7a91;
         color: white;
         border: none;
         width: 100%;
         font-size: 18px;
         cursor: pointer;
         margin-top: 20px;
         transition: 0.3s;
      }

      form input[type="submit"]:hover {
         background: #2c3e50;
      }

      #footer {
         background-color: #2c3e50;
         color: white;
         text-align: center;
         padding: 15px;
         font-size: 14px;
         border-top: 2px solid #3e7a91;
      }

      #footer a {
         color: #fff;
         text-decoration: underline;
      }

      #footer a:hover {
         color: #00ffee;
      }
   </style>
</head>
<body>

   <header id="header">Fraud Auditor</header>

   <main>
      <section class="form-box">
         <h2>Submit Claim Details</h2>
         <form method="post" action="/submit-claim">
            <label for="providerId">Provider ID</label>
            <input type="text" id="providerId" name="providerId" required>

            <label for="patientId">Patient ID</label>
            <input type="text" id="patientId" name="patientId" required>

            <label for="dateOfService">Date of Service</label>
            <input type="date" id="dateOfService" name="dateOfService" required>

            <label for="billedAmount">Billed Amount (₹)</label>
            <input type="number" id="billedAmount" name="billedAmount" step="0.01" required>

            <label for="procedureCode">Procedure Code (CPT/HCPCS)</label>
            <input type="text" id="procedureCode" name="procedureCode" required>

            <label for="diagnosisCode">Diagnosis Code (ICD-10)</label>
            <input type="text" id="diagnosisCode" name="diagnosisCode" required>

            <label for="allowedAmount">Allowed Amount (₹)</label>
            <input type="number" id="allowedAmount" name="allowedAmount" step="0.01" required>

            <label for="paidAmount">Paid Amount (₹)</label>
            <input type="number" id="paidAmount" name="paidAmount" step="0.01" required>

            <label for="insuranceType">Insurance Type</label>
            <select id="insuranceType" name="insuranceType" required>
               <option value="">--Select--</option>
               <option value="Private">Private</option>
               <option value="Government">Government</option>
               <option value="Employer">Employer</option>
               <option value="Self-Paid">Self-Paid</option>
            </select>

            <label for="claimStatus">Claim Status</label>
            <select id="claimStatus" name="claimStatus" required>
               <option value="">--Select--</option>
               <option value="Submitted">Submitted</option>
               <option value="Pending">Pending</option>
               <option value="Approved">Approved</option>
               <option value="Denied">Denied</option>
            </select>

            <label for="outcome">Outcome</label>
            <input type="text" id="outcome" name="outcome" required>

            <input type="submit" value="Submit Claim">
         </form>
      </section>
   </main>

   <footer id="footer">
      <p><strong>Fraud Auditor</strong> – A Visual Analytics Tool for Detecting Collusive Fraud in Health Insurance</p>
      <p>Developed by Team 11 | Contact: <a href="mailto:support@fraudauditor.com">support@fraudauditor.com</a></p>
      <p>&copy; 2025 Fraud Auditor. All rights reserved.</p>
   </footer>

</body>
</html>
